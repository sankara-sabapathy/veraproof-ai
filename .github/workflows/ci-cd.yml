name: VeraProof AI - CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  AWS_REGION: ap-south-1
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: veraproof
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: veraproof_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd backend
          pytest tests -q --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=40
        env:
          DATABASE_URL: postgresql://veraproof:test_password@localhost:5432/veraproof_test
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: veraproof-artifacts-test
          JWT_SECRET: test-secret-key-for-ci-only
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION_HOURS: 1
          REFRESH_TOKEN_EXPIRATION_DAYS: 30
          APP_SESSION_SECRET: ci-app-session-secret
          APP_ENCRYPTION_KEY: ci-app-encryption-key
          GOOGLE_OAUTH_ENABLED: false
          ENVIRONMENT: test
          STAGE: test
          BACKEND_URL: http://localhost:8100
          FRONTEND_VERIFICATION_URL: http://localhost:8300
          FRONTEND_DASHBOARD_URL: http://localhost:8200
          CORS_ORIGINS: http://localhost:8200,http://localhost:8300
          MAX_CONCURRENT_SESSIONS: 10
          API_RATE_LIMIT_PER_MINUTE: 100
          SESSION_EXPIRATION_MINUTES: 15
          SESSION_EXTENSION_MINUTES: 10
          ARTIFACT_RETENTION_DAYS: 90
          SIGNED_URL_EXPIRATION_SECONDS: 3600
          USE_MOCK_SAGEMAKER: true
          USE_MOCK_RAZORPAY: true
          USE_LOCAL_AUTH: true
          VERAPROOF_AI_MODEL_ID: gemini
          OTEL_EXPORTER_OTLP_ENDPOINT: ''
          OTEL_EXPORTER_OTLP_HEADERS: ''
          OTEL_SERVICE_NAME: veraproof-backend-test
      - uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: partner-dashboard/package-lock.json
      - name: Install dashboard dependencies
        run: |
          cd partner-dashboard
          npm ci --legacy-peer-deps
      - name: Build dashboard
        run: |
          cd partner-dashboard
          npm run build

  verification-interface-check:
    name: Verification Interface Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check verification interface scripts
        run: |
          cd verification-interface
          node --check ./js/main.js
          node --check ./js/ws-manager.js
          node --check ./js/ui-controller.js

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [backend-tests, dashboard-build, verification-interface-check, security-scan]
    if: github.event_name == 'push'
    outputs:
      lightsail-service: ${{ steps.outputs.outputs.lightsail-service }}
      dashboard-bucket: ${{ steps.outputs.outputs.dashboard-bucket }}
      verification-bucket: ${{ steps.outputs.outputs.verification-bucket }}
      dashboard-distribution: ${{ steps.outputs.outputs.dashboard-distribution }}
      verification-distribution: ${{ steps.outputs.outputs.verification-distribution }}
      dashboard-url: ${{ steps.outputs.outputs.dashboard-url }}
      verification-url: ${{ steps.outputs.outputs.verification-url }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install CDK dependencies
        run: |
          npm install -g aws-cdk
          cd infrastructure
          pip install -r requirements.txt
      - name: Determine stage
        id: stage
        run: echo "stage=prod" >> $GITHUB_OUTPUT
      - name: Get AWS account id
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: CDK Deploy
        run: |
          cd infrastructure
          cdk deploy --all \
            --context stage=${{ steps.stage.outputs.stage }} \
            --context account=${{ steps.account.outputs.id }} \
            --require-approval never \
            --outputs-file cdk-outputs.json
      - name: Extract outputs
        id: outputs
        run: |
          cd infrastructure
          LIGHTSAIL_SERVICE=$(jq -r '.["Veraproof-Lightsail-Stack-${{ steps.stage.outputs.stage }}"]["LightsailContainerService${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          DASHBOARD_BUCKET=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["DashboardBucketName${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          VERIFICATION_BUCKET=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["VerificationBucketName${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          DASHBOARD_DIST=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["DashboardDistributionID${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          VERIFICATION_DIST=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["VerificationDistributionID${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          DASHBOARD_URL=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["DashboardURL${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          VERIFICATION_URL=$(jq -r '.["Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }}"]["VerificationURL${{ steps.stage.outputs.stage }}"]' cdk-outputs.json)
          echo "lightsail-service=$LIGHTSAIL_SERVICE" >> $GITHUB_OUTPUT
          echo "dashboard-bucket=$DASHBOARD_BUCKET" >> $GITHUB_OUTPUT
          echo "verification-bucket=$VERIFICATION_BUCKET" >> $GITHUB_OUTPUT
          echo "dashboard-distribution=$DASHBOARD_DIST" >> $GITHUB_OUTPUT
          echo "verification-distribution=$VERIFICATION_DIST" >> $GITHUB_OUTPUT
          echo "dashboard-url=$DASHBOARD_URL" >> $GITHUB_OUTPUT
          echo "verification-url=$VERIFICATION_URL" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy Backend to Lightsail
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Determine stage
        id: stage
        run: echo "stage=prod" >> $GITHUB_OUTPUT
      - name: Get AWS account id
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: Get database credentials
        id: db-creds
        run: |
          DB_PASSWORD=$(aws lightsail get-relational-database-master-user-password \
            --relational-database-name veraproof-db-${{ steps.stage.outputs.stage }} \
            --region ${{ env.AWS_REGION }} \
            --query 'masterUserPassword' \
            --output text)
          DB_ENDPOINT=$(aws lightsail get-relational-database \
            --relational-database-name veraproof-db-${{ steps.stage.outputs.stage }} \
            --region ${{ env.AWS_REGION }} \
            --query 'relationalDatabase.masterEndpoint.address' \
            --output text)
          ENCODED_PASSWORD=$(printf '%s' "$DB_PASSWORD" | python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=''))")
          echo ::add-mask::$DB_PASSWORD
          echo ::add-mask::$ENCODED_PASSWORD
          echo "password=$ENCODED_PASSWORD" >> $GITHUB_OUTPUT
          echo "endpoint=$DB_ENDPOINT" >> $GITHUB_OUTPUT
      - name: Fetch deployment parameters
        id: params
        run: |
          set -euo pipefail
          get_required() {
            local name="$1"
            local key="$2"
            local value
            value=$(aws ssm get-parameter --name "$name" --with-decryption --query 'Parameter.Value' --output text)
            echo "::add-mask::$value"
            echo "$key=$value" >> $GITHUB_OUTPUT
          }
          get_optional() {
            local name="$1"
            local key="$2"
            local value
            value=$(aws ssm get-parameter --name "$name" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true)
            echo "$key=$value" >> $GITHUB_OUTPUT
          }
          PREFIX="/veraproof/${{ steps.stage.outputs.stage }}"
          get_required "$PREFIX/security/app_session_secret" app_session_secret
          get_required "$PREFIX/security/app_encryption_key" app_encryption_key
          get_required "$PREFIX/google/client_id" google_client_id
          get_required "$PREFIX/google/client_secret" google_client_secret
          get_required "$PREFIX/auth/platform_admin_emails" platform_admin_emails
          get_required "$PREFIX/api/gemini_key" gemini_api_key
          get_required "$PREFIX/backend/aws_access_key_id" backend_aws_access_key_id
          get_required "$PREFIX/backend/aws_secret_access_key" backend_aws_secret_access_key
          get_optional "$PREFIX/observability/otlp_endpoint" otlp_endpoint
          get_optional "$PREFIX/observability/otlp_headers" otlp_headers
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          cd backend
          docker build -t veraproof-api:${{ github.sha }} .
      - name: Install lightsailctl
        run: |
          curl "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o "/tmp/lightsailctl"
          sudo mv /tmp/lightsailctl /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl
      - name: Push image to Lightsail
        id: push-image
        run: |
          SERVICE_NAME="${{ needs.deploy-infrastructure.outputs.lightsail-service }}"
          aws lightsail push-container-image \
            --service-name "$SERVICE_NAME" \
            --label veraproof-api \
            --image veraproof-api:${{ github.sha }} \
            --region ${{ env.AWS_REGION }} 2>&1 | tee push-output.txt
          IMAGE_NAME=$(grep -oE ':[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[0-9]+' push-output.txt | head -n1)
          if [ -z "$IMAGE_NAME" ]; then
            echo "Failed to extract Lightsail image name"
            cat push-output.txt
            exit 1
          fi
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
      - name: Create deployment configuration
        run: |
          set -euo pipefail
          JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')
          API_URL=$(aws lightsail get-container-services \
            --service-name ${{ needs.deploy-infrastructure.outputs.lightsail-service }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].url' \
            --output text)
          API_URL=${API_URL%/}
          if [[ "$API_URL" != http://* && "$API_URL" != https://* ]]; then
            API_URL="https://$API_URL"
          fi
          GOOGLE_REDIRECT_URI="$API_URL/api/v1/auth/google/callback"
          cat > deployment.json <<EOF
          {
            "containers": {
              "app": {
                "image": "${{ steps.push-image.outputs.image }}",
                "ports": {"8000": "HTTP"},
                "environment": {
                  "STAGE": "${{ steps.stage.outputs.stage }}",
                  "ENVIRONMENT": "production",
                  "AWS_REGION": "${{ env.AWS_REGION }}",
                  "AWS_ENDPOINT_URL": "",
                  "DATABASE_URL": "postgresql://veraproof_admin:${{ steps.db-creds.outputs.password }}@$DB_ENDPOINT:5432/veraproof?sslmode=require",
                  "S3_BUCKET_NAME": "veraproof-artifacts-${{ steps.stage.outputs.stage }}-${{ steps.account.outputs.id }}",
                  "JWT_SECRET": "$JWT_SECRET",
                  "JWT_ALGORITHM": "HS256",
                  "JWT_EXPIRATION_HOURS": "1",
                  "REFRESH_TOKEN_EXPIRATION_DAYS": "30",
                  "APP_SESSION_SECRET": "${{ steps.params.outputs.app_session_secret }}",
                  "APP_ENCRYPTION_KEY": "${{ steps.params.outputs.app_encryption_key }}",
                  "GOOGLE_OAUTH_ENABLED": "true",
                  "GOOGLE_CLIENT_ID": "${{ steps.params.outputs.google_client_id }}",
                  "GOOGLE_CLIENT_SECRET": "${{ steps.params.outputs.google_client_secret }}",
                  "GOOGLE_REDIRECT_URI": "$GOOGLE_REDIRECT_URI",
                  "GOOGLE_OAUTH_SCOPES": "openid email profile",
                  "PLATFORM_ADMIN_EMAILS": "${{ steps.params.outputs.platform_admin_emails }}",
                  "SESSION_COOKIE_SECURE": "true",
                  "SESSION_COOKIE_SAMESITE": "none",
                  "WS_TOKEN_EXPIRATION_SECONDS": "900",
                  "REQUIRE_WS_TOKEN": "true",
                  "BACKEND_URL": "$API_URL",
                  "FRONTEND_DASHBOARD_URL": "${{ needs.deploy-infrastructure.outputs.dashboard-url }}",
                  "FRONTEND_VERIFICATION_URL": "${{ needs.deploy-infrastructure.outputs.verification-url }}",
                  "CORS_ORIGINS": "${{ needs.deploy-infrastructure.outputs.dashboard-url }},${{ needs.deploy-infrastructure.outputs.verification-url }}",
                  "MAX_CONCURRENT_SESSIONS": "10",
                  "API_RATE_LIMIT_PER_MINUTE": "100",
                  "SESSION_EXPIRATION_MINUTES": "15",
                  "SESSION_EXTENSION_MINUTES": "10",
                  "ARTIFACT_RETENTION_DAYS": "90",
                  "SIGNED_URL_EXPIRATION_SECONDS": "3600",
                  "USE_MOCK_SAGEMAKER": "false",
                  "USE_MOCK_RAZORPAY": "true",
                  "USE_LOCAL_AUTH": "false",
                  "VERAPROOF_AI_MODEL_ID": "gemini",
                  "GEMINI_API_KEY": "${{ steps.params.outputs.gemini_api_key }}",
                  "OTEL_EXPORTER_OTLP_ENDPOINT": "${{ steps.params.outputs.otlp_endpoint }}",
                  "OTEL_EXPORTER_OTLP_HEADERS": "${{ steps.params.outputs.otlp_headers }}",
                  "OTEL_SERVICE_NAME": "veraproof-backend-${{ steps.stage.outputs.stage }}",
                  "AWS_ACCESS_KEY_ID": "${{ steps.params.outputs.backend_aws_access_key_id }}",
                  "AWS_SECRET_ACCESS_KEY": "${{ steps.params.outputs.backend_aws_secret_access_key }}"
                }
              }
            },
            "publicEndpoint": {
              "containerName": "app",
              "containerPort": 8000,
              "healthCheck": {
                "path": "/health",
                "intervalSeconds": 30,
                "timeoutSeconds": 5,
                "healthyThreshold": 2,
                "unhealthyThreshold": 2,
                "successCodes": "200"
              }
            }
          }
          EOF
        env:
          DB_ENDPOINT: ${{ steps.db-creds.outputs.endpoint }}
      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --service-name ${{ needs.deploy-infrastructure.outputs.lightsail-service }} \
            --cli-input-json file://deployment.json \
            --region ${{ env.AWS_REGION }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: partner-dashboard/package-lock.json
      - name: Determine stage
        id: stage
        run: echo "stage=prod" >> $GITHUB_OUTPUT
      - name: Install dashboard dependencies
        run: |
          cd partner-dashboard
          npm ci --legacy-peer-deps
      - name: Get backend API URL
        id: api-url
        run: |
          API_URL=$(aws lightsail get-container-services \
            --service-name ${{ needs.deploy-infrastructure.outputs.lightsail-service }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].url' \
            --output text)
          API_URL=${API_URL%/}
          if [[ "$API_URL" != http://* && "$API_URL" != https://* ]]; then
            API_URL="https://$API_URL"
          fi
          echo "url=$API_URL" >> $GITHUB_OUTPUT
      - name: Update production environment file
        run: |
          cat > partner-dashboard/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '${{ steps.api-url.outputs.url }}'
          };
          EOF
      - name: Build dashboard
        run: |
          cd partner-dashboard
          npm run build
      - name: Deploy dashboard to S3
        run: |
          aws s3 sync partner-dashboard/dist/partner-dashboard/browser \
            s3://${{ needs.deploy-infrastructure.outputs.dashboard-bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          aws s3 sync partner-dashboard/dist/partner-dashboard/browser \
            s3://${{ needs.deploy-infrastructure.outputs.dashboard-bucket }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "index.html" \
            --include "*.json"
      - name: Invalidate dashboard cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infrastructure.outputs.dashboard-distribution }} \
            --paths '/*'
      - name: Deploy verification interface to S3
        run: |
          cd verification-interface
          sed -e "s|{{API_URL}}|${{ steps.api-url.outputs.url }}|g" \
              -e "s|{{ENVIRONMENT}}|production|g" \
              -e "s|{{VERSION}}|${{ github.sha }}|g" \
              config.template.js > config.js
          cd ..
          aws s3 sync verification-interface \
            s3://${{ needs.deploy-infrastructure.outputs.verification-bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "config.js" \
            --exclude "config.template.js" \
            --exclude "README.md"
          aws s3 sync verification-interface \
            s3://${{ needs.deploy-infrastructure.outputs.verification-bucket }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "index.html" \
            --include "config.js"
      - name: Invalidate verification cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infrastructure.outputs.verification-distribution }} \
            --paths '/*'

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Determine stage
        id: stage
        run: echo "stage=prod" >> $GITHUB_OUTPUT
      - name: Get deployment URLs
        id: urls
        run: |
          API_URL=$(aws lightsail get-container-services \
            --service-name ${{ needs.deploy-infrastructure.outputs.lightsail-service }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].url' \
            --output text)
          API_URL=${API_URL%/}
          if [[ "$API_URL" != http://* && "$API_URL" != https://* ]]; then
            API_URL="https://$API_URL"
          fi
          DASHBOARD_URL=$(aws cloudformation describe-stacks \
            --stack-name Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardURL${{ steps.stage.outputs.stage }}'].OutputValue" \
            --output text)
          VERIFICATION_URL=$(aws cloudformation describe-stacks \
            --stack-name Veraproof-Frontend-Stack-${{ steps.stage.outputs.stage }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='VerificationURL${{ steps.stage.outputs.stage }}'].OutputValue" \
            --output text)
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "dashboard-url=$DASHBOARD_URL" >> $GITHUB_OUTPUT
          echo "verification-url=$VERIFICATION_URL" >> $GITHUB_OUTPUT
      - name: Test API health
        run: |
          sleep 30
          curl -f -s ${{ steps.urls.outputs.api-url }}/health > /dev/null
      - name: Test API root
        run: |
          curl -f -s ${{ steps.urls.outputs.api-url }}/ > /dev/null
      - name: Test dashboard
        run: |
          curl -f -s ${{ steps.urls.outputs.dashboard-url }} > /dev/null
      - name: Test verification interface
        run: |
          curl -f -s ${{ steps.urls.outputs.verification-url }} > /dev/null
