<div class="sessions-list">
  <div class="header">
    <h2>Sessions</h2>
    <p-button label="Create Session" icon="pi pi-plus" (onClick)="createSession()" styleClass="p-button-raised">
    </p-button>
  </div>

  <div>
    <p-card>
      <app-data-table [columns]="columns" [data]="sessions" [loading]="loading">
      </app-data-table>
    </p-card>
  </div>
</div>
