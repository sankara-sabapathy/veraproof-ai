<p-card styleClass="preview-card">
  <ng-template pTemplate="header">
    <div class="card-header">
      <div>
        <h2>Live Preview</h2>
        <p class="card-subtitle">A simplified verification surface using your current brand roles.</p>
      </div>
    </div>
  </ng-template>
  <ng-template pTemplate="content">
    <div class="verification-preview" *ngIf="config" [ngStyle]="previewStyles">
      <div class="preview-frame">
        <div class="preview-topbar">
          <div class="preview-logo-area">
            <img *ngIf="config.logo_url" [src]="config.logo_url" alt="Logo" class="preview-logo">
            <div *ngIf="!config.logo_url" class="preview-logo-placeholder">Your mark</div>
          </div>
          <span class="preview-chip">Identity Check</span>
        </div>

        <div class="preview-body">
          <h3>Verification in progress</h3>
          <p>Follow the on-screen prompt to complete the live capture.</p>

          <div class="preview-progress">
            <div class="progress-bar"></div>
          </div>

          <div class="preview-instruction">
            <span class="instruction-kicker">Current prompt</span>
            <strong>Tilt phone to the right</strong>
          </div>

          <button class="preview-button">Continue</button>
        </div>
      </div>
    </div>
  </ng-template>
</p-card>
