<div class="tenant-list">
  <h2>Tenant Management</h2>

  <p-card styleClass="filters">
    <div class="filter-row">
      <span class="p-input-icon-left search-field">
        <i class="pi pi-search"></i>
        <input pInputText type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearch()"
          placeholder="Search by email..." />
      </span>

      <p-dropdown [(ngModel)]="selectedTier" [options]="tierOptions" optionLabel="label" optionValue="value"
        (onChange)="onFilterChange()" placeholder="Subscription Tier" styleClass="filter-dropdown">
      </p-dropdown>

      <p-dropdown [(ngModel)]="selectedStatus" [options]="statusOptions" optionLabel="label" optionValue="value"
        (onChange)="onFilterChange()" placeholder="Status" styleClass="filter-dropdown">
      </p-dropdown>
    </div>
  </p-card>

  <p-card *ngIf="!loading; else loadingTemplate">
    <app-data-table [columns]="columns" [data]="tenants" [loading]="loading">
    </app-data-table>

    <div *ngIf="tenants.length === 0" class="no-data">
      <i class="pi pi-building" style="font-size: 4rem"></i>
      <p>No tenants found</p>
    </div>
  </p-card>

  <ng-template #loadingTemplate>
    <app-loading-spinner message="Loading tenants..."></app-loading-spinner>
  </ng-template>
</div>
