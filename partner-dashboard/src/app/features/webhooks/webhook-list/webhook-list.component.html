<div class="webhook-list">
  <div class="header">
    <h2>Webhooks</h2>
    <p-button label="Add Webhook" icon="pi pi-plus" (onClick)="openCreateDialog()">
    </p-button>
  </div>

  <p-card *ngIf="webhooks$ | async as webhooks; else loading">
    <app-data-table [columns]="columns" [data]="webhooks" [loading]="false">
    </app-data-table>
  </p-card>

  <ng-template #loading>
    <app-loading-spinner message="Loading webhooks..."></app-loading-spinner>
  </ng-template>
</div>
