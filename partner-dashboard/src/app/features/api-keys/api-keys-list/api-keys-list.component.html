<div class="api-keys-container">
  <div class="header">
    <h2>API Keys</h2>
    <p-button label="Generate API Key" icon="pi pi-plus" (onClick)="onCreateKey()">
    </p-button>
  </div>

  <p-card>
    <!-- Data Table -->
    <app-data-table [columns]="columns" [data]="apiKeys" [loading]="(loading$ | async) ?? false"
      searchPlaceholder="Search API keys...">
    </app-data-table>
  </p-card>
</div>
