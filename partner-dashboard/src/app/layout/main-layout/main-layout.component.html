<div class="layout-shell" [class.menu-open]="isMobileMenuOpen">
  <app-toolbar
    (menuToggle)="toggleSidebar()"
    [showMenuButton]="true"
    [menuOpen]="sidebarVisible">
  </app-toolbar>

  <div class="layout-body">
    <aside class="layout-sidebar" *ngIf="!isHandset && sidebarVisible">
      <app-sidebar (navItemClick)="onSidebarNavClick()"></app-sidebar>
    </aside>

    <main class="main-content" [attr.aria-hidden]="isMobileMenuOpen ? 'true' : null">
      <router-outlet></router-outlet>
    </main>
  </div>

  <div class="mobile-nav-layer" *ngIf="isHandset" [class.open]="isMobileMenuOpen">
    <button
      type="button"
      class="mobile-nav-backdrop"
      [class.visible]="isMobileMenuOpen"
      [attr.aria-hidden]="!isMobileMenuOpen"
      [tabIndex]="isMobileMenuOpen ? 0 : -1"
      (click)="closeSidebar()">
    </button>

    <aside
      class="mobile-sidebar"
      [class.open]="isMobileMenuOpen"
      [attr.aria-hidden]="!isMobileMenuOpen"
      [attr.aria-modal]="isMobileMenuOpen"
      aria-label="Primary navigation">
      <app-sidebar
        [isMobile]="true"
        (navItemClick)="onSidebarNavClick()"
        (dismiss)="closeSidebar()">
      </app-sidebar>
    </aside>
  </div>
</div>
