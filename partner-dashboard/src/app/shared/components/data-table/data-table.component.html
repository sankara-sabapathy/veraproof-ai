<div class="data-table-container">
  <div class="table-toolbar">
    <div class="search-wrapper">
      <i class="pi pi-search search-icon"></i>
      <input type="text" class="search-input" placeholder="Search across all columns..." [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchChange()" />
    </div>
  </div>

  <div class="grid-wrapper">
    <ag-grid-angular [theme]="gridTheme" [rowData]="data" [columnDefs]="columns" [defaultColDef]="defaultColDef"
      [rowSelection]="rowSelection" [pagination]="true" [paginationPageSize]="pageSize"
      [paginationPageSizeSelector]="paginationPageSizeSelector" [domLayout]="domLayout" [animateRows]="true"
      [suppressCellFocus]="true" [loading]="loading"
      [overlayNoRowsTemplate]="'<div class=&quot;no-rows-overlay&quot;><i class=&quot;pi pi-inbox&quot; style=&quot;font-size:40px;color:#94a3b8;margin-bottom:12px;&quot;></i><p style=&quot;color:#64748b;font-size:14px;&quot;>No data available</p></div>'"
      (gridReady)="onGridReady($event)" (rowClicked)="onRowClicked($event)"
      (selectionChanged)="onSelectionChanged($event)">
    </ag-grid-angular>
  </div>
</div>
